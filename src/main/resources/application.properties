# =============================================================================
# TASK ENGINE — Application Configuration
# =============================================================================
# Spring Boot's application.properties is the central config file.
# We're using it to tune the embedded Tomcat server and logging.

spring.application.name=TaskEngine

# =============================================================================
# TOMCAT (HTTP SERVER) THREAD POOL SETTINGS
# =============================================================================
# Tomcat has its OWN thread pool separate from our custom task executor.
# These are the threads that receive HTTP connections and call our controller.
#
# Default is 200; we're lowering it to 50 intentionally so you can see
# the clear separation between HTTP threads and task execution threads.
#
# During benchmarks, watch the logs: you'll see Tomcat threads are freed
# immediately after submitting to the queue (because we use CompletableFuture),
# while the task pool threads are what actually get saturated.
#
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10

# =============================================================================
# LOGGING
# =============================================================================
# Set our application package to DEBUG so you can see every SUBMIT/EXECUTE/DONE
# log line in real-time as tasks move through the system.
# This live log view IS your primary benchmark dashboard for Phase 2.
#
logging.level.com.example.task_engine=DEBUG

# Readable log pattern: just time + level + message (no noisy prefixes)
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
